services:
  atuin:
    container_name: atuin
    restart: always
    image: ghcr.io/atuinsh/atuin:c28ac1b
    command: server start
    volumes:
      - "./data/config:/config"
    ports:
      - 8888:8888
    environment:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_OPEN_REGISTRATION: "true"
      ATUIN_DB_URI: postgres://$ATUIN_DB_USERNAME:$ATUIN_DB_PASSWORD@db/$ATUIN_DB_NAME
      RUST_LOG: info,atuin_server=debug
    depends_on:
      - db
    networks:
      - terminalnetwork

  db:
    container_name: atuin_db
    image: postgres:18
    restart: unless-stopped
    networks:
      - terminalnetwork
    volumes: # PG 18+: mount parent dir (cluster lives in .../18/docker). See postgres Docker README.
      - "./data/database:/var/lib/postgresql"
    environment:
      POSTGRES_USER: ${ATUIN_DB_USERNAME}
      POSTGRES_PASSWORD: ${ATUIN_DB_PASSWORD}
      POSTGRES_DB: ${ATUIN_DB_NAME}

  # Backup service for atuin database
  backup:
    container_name: atuin_db_dumper
    image: prodrigestivill/postgres-backup-local
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${ATUIN_DB_NAME}
      POSTGRES_USER: ${ATUIN_DB_USERNAME}
      POSTGRES_PASSWORD: ${ATUIN_DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_DIR: /db_dumps
    volumes:
      - ./data/db_dumps:/db_dumps
    depends_on:
      - db
    networks:
      - terminalnetwork

networks:
  terminalnetwork:
    name: terminalnetwork
