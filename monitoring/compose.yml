networks:
  monitoringnetwork:
    name: monitoringnetwork
    ipam:
      config:
        - subnet: ${MONITORING_SUBNET:-172.39.1.0/24}

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      - APP_URL=${BESZEL_URL:-http://localhost:8090}
      - LOG_LEVEL=${BESZEL_LOG_LEVEL:-info}
    ports:
      - ${BESZEL_PORT:-8090}:${BESZEL_PORT:-8090}
    volumes:
      - ./data/beszel_data:/beszel_data
    networks:
      monitoringnetwork:
        ipv4_address: ${BESZEL_IP:-172.39.1.2}

  beszelagent:
    image: henrygd/beszel-agent:latest
    container_name: beszelagent
    restart: unless-stopped
    network_mode: service:beszel
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      LISTEN: ${BESZEL_AGENT_LISTEN:-45876}
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      HUB_URL: ${BESZEL_URL}

    # optional but helpful log viewer
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    container_name: dozzle
    environment:
      DOZZLE_REMOTE_AGENT: ${DOZZLE_REMOTE_AGENT}
      DOZZLE_HOSTNAME: ${DOZZLE_HOSTNAME:-mario}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dozzle_data:/data
    ports:
      - "8181:8080"
    networks:
      monitoringnetwork:
        ipv4_address: ${DOZZLE_IP:-172.39.1.3}

  dozzle-agent:
    image: amir20/dozzle:latest
    command: agent
    restart: unless-stopped
    container_name: dozzle-agent
    environment:
      DOZZLE_HOSTNAME: ${DOZZLE_HOSTNAME:-mario}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "7007:7007"
