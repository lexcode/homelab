services:
  # PIA WireGuard (thrnz/docker-wireguard-pia) — create ./pia and ./pia-shared on the host
  vpn:
    image: thrnz/docker-wireguard-pia
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080/tcp # qBittorrent WebUI (was 8080 if nothing else uses 8080)
      - 6881:6881/tcp
      - 6881:6881/udp
    volumes:
      - ./pia:/pia
      - ./pia-shared:/pia-shared
    env_file:
      - .env
    environment:
      - LOC=${PIA_LOC:-swiss}
      - USER=${OPENVPN_USER}
      - PASS=${OPENVPN_PASSWORD}
      - LOCAL_NETWORK=${LOCAL_NETWORK}
      - PORT_FORWARDING=1
      - PORT_PERSIST=1
      - VPNDNS=${VPNDNS}
      - TZ=${TZ}
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      - deunhealth.restart.on.unhealthy=true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${WEBUI_PORT} # must match vpn service published WebUI port
      - TORRENTING_PORT=${TORRENTING_PORT}
    volumes:
      - ./qbittorrent:/config
      - /data:/data
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    network_mode: service:vpn
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s

  # See the 'qBittorrent Stalls with VPN Timeout' section for more information.
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${TZ}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
