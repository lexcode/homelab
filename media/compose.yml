networks:
  servarrnetwork:
    name: servarrnetwork
    ipam:
      config:
        # If you change SERVARR_SUBNET in .env, update every ipv4_address below to match that range.
        - subnet: ${SERVARR_SUBNET:-172.39.0.0/24}

# Docker's embedded DNS often forwards to the host resolver and returns SERVFAIL for some names
# (e.g. api.radarr.video). Merge `<<: *arr-dns` on servarrnetwork services only — not with network_mode: service:vpn
# (those inherit dns from the vpn container).
x-arr-dns: &arr-dns
  dns:
    - 1.1.1.1
    - 8.8.8.8

services:
  # PIA WireGuard — ./pia and ./pia-shared on the host
  # Stays on servarrnetwork at ${VPN_IP} so other containers can reach qBittorrent at http://${VPN_IP}:${WEBUI_PORT}
  vpn:
    image: thrnz/docker-wireguard-pia
    container_name: vpn
    dns:
      - 1.1.1.1
      - 8.8.8.8
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - ${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080} # qBittorrent WebUI
      - ${TORRENTING_PORT:-6881}:${TORRENTING_PORT:-6881}
      - 9696:9696 # prowlarr
      - 8191:8191 # flaresolverr
    networks:
      servarrnetwork:
        ipv4_address: ${VPN_IP:-172.39.0.2}
    volumes:
      - ./data/pia:/pia
      - ./data/pia-shared:/pia-shared
    env_file:
      - .env
    environment:
      - LOC=${PIA_LOC:-swiss}
      - USER=${OPENVPN_USER}
      - PASS=${OPENVPN_PASSWORD}
      - LOCAL_NETWORK=${LOCAL_NETWORK}
      - PORT_FORWARDING=1
      - PORT_PERSIST=1
      - MTU=1280 # Pi / VPN: avoids path-MTU black holes that show up as stalled torrents
      # - VPNDNS=${VPNDNS}
      - TZ=${TZ}
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    restart: unless-stopped
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # vpn:
  #   image: qmcgaw/gluetun
  #   cap_add:
  #     - NET_ADMIN
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   networks:
  #     servarrnetwork:
  #       ipv4_address: ${VPN_IP:-172.39.0.2}
  #   ports:
  #     - ${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080} # qBittorrent WebUI
  #     - ${TORRENTING_PORT:-6881}:${TORRENTING_PORT:-6881}
  #     - ${PROWLARR_PORT:-9696}:${PROWLARR_PORT:-9696} # prowlarr
  #     - ${FLARESOLVERR_PORT:-8191}:${FLARESOLVERR_PORT:-8191} # flaresolverr
  #   volumes:
  #     - ./gluetun:/gluetun
  #   env_file:
  #     - .env
  #   restart: unless-stopped


  # qBittorrent WebUI → Settings → Advanced: set "Network interface" to wg0 (WireGuard in vpn
  # container). Use IPv4 only if stalls persist (IPv6 disabled on vpn sysctls). Gluetun/OpenVPN
  # typically uses tun0 instead of wg0.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      - deunhealth.restart.on.unhealthy=true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${WEBUI_PORT:-8080}
      - TORRENTING_PORT=${TORRENTING_PORT}
    volumes:
      - ./data/qbittorrent:/config
      - /data:/data
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    network_mode: service:vpn
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s

  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${TZ}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock



  sonarr:
    <<: *arr-dns
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/sonarr:/config
      - /data:/data
    ports:
      - 8989:8989
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    networks:
      servarrnetwork:
        ipv4_address: ${SONARR_IP:-172.39.0.3}

  radarr:
    <<: *arr-dns
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/radarr:/config
      - /data:/data
    ports:
      - 7878:7878
    networks:
      servarrnetwork:
        ipv4_address: ${RADARR_IP:-172.39.0.4}

  lidarr:
    <<: *arr-dns
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/lidarr:/config
      - /data:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 8686:8686
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    networks:
      servarrnetwork:
        ipv4_address: ${LIDARR_IP:-172.39.0.5}

  bazarr:
    <<: *arr-dns
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/bazarr:/config
      - /data:/data
    ports:
      - 6767:6767
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    networks:
      servarrnetwork:
        ipv4_address: ${BAZARR_IP:-172.39.0.6}

  seerr:
    <<: *arr-dns
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    environment:
      - LOG_LEVEL=debug
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./data/seerr:/app/config
    ports:
      - 5055:5055
    networks:
      servarrnetwork:
        ipv4_address: ${SEERR_IP:-172.39.0.7}

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/prowlarr:/config
    restart: unless-stopped
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    network_mode: service:vpn
    
  # Host network: outbound calls to Jellyfin/Plex use the host LAN IP (e.g. 192.168.0.5).
  # On a bridged custom network, TCP can leave with source 172.39.0.x; LAN-only firewalls
  # (common on Unraid) then block :8096 while ping still works — same symptom as your wget timeout.
  suggestarr:
    image: ciuse99/suggestarr:latest
    container_name: suggestarr
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/suggestarr/config_files:/app/config/config_files
    environment:
      - LOG_LEVEL=${SUGGESTARR_LOG_LEVEL:-info}
      - SUGGESTARR_PORT=${SUGGESTARR_PORT:-5000}

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    restart: unless-stopped
    depends_on:
      vpn:
        condition: service_healthy
        restart: true
    network_mode: service:vpn
